name: edu_kids_app
description: Aplikasi Gamifikasi Edukatif untuk Anak SD
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.7.0
  cloud_firestore: ^5.6.0

  # UI & Animation
  cupertino_icons: ^1.0.6
  animated_text_kit: ^4.2.2
  lottie: ^2.7.0
  flutter_animate: ^4.3.0
  confetti: ^0.7.0

  # State Management
  provider: ^6.1.1

  # Audio
  audioplayers: ^5.2.1

  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4
  # Storage
  shared_preferences: ^2.2.2

  # Utils
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  percent_indicator: ^4.2.3
  fl_chart: ^0.66.0

  # ... existing dependencies
  pdf: ^3.11.1
  printing: ^5.13.1
  excel: ^4.0.6
  path_provider: ^2.1.4
  share_plus: ^10.0.2
  intl: ^0.19.0
  open_file: ^3.3.2
  table_calendar: ^3.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/sounds/
    - assets/music/
